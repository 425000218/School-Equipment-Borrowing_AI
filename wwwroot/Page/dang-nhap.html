<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEB - Đăng nhập</title>
    <link rel="stylesheet" href="/CSS/main.css">
    <style>
        /* ... existing styles ... */
        .login-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(160deg, #f8fafc 0%, #e2e8f0 100%);
            padding: 16px;
        }
        .login-card {
            width: 100%;
            max-width: 460px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 14px 40px rgba(15, 23, 42, 0.1);
            padding: 24px;
        }
        .login-title {
            margin: 0 0 4px;
            color: #0f172a;
            font-size: 1.5rem;
            text-align: center;
        }
        .login-sub {
            margin: 0 0 18px;
            color: #64748b;
            font-size: 0.95rem;
            text-align: center;
        }
        .field { margin-bottom: 14px; }
        .field label {
            display: block;
            margin-bottom: 6px;
            color: #334155;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .field select, .field input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.95rem;
        }
        .actions {
            margin-top: 18px;
            display: flex;
            gap: 10px;
        }
        .btn {
            border: 0;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-primary {
            background: #0ea5e9;
            color: #fff;
            flex: 1;
        }
        .btn-ghost {
            background: #e2e8f0;
            color: #0f172a;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .helper {
            margin-top: 14px;
            color: #64748b;
            font-size: 0.85rem;
            line-height: 1.4;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
        }
        .tab-btn.active {
            color: #0ea5e9;
            border-bottom-color: #0ea5e9;
        }
        .form-panel {
            display: none;
        }
        .form-panel.active {
            display: block;
        }
    </style>
    <link rel="stylesheet" href="/CSS/ui-improvements.css">
</head>
<body>
    <main class="login-shell">
        <section class="login-card">
            <h1 class="login-title">Hệ thống SEB</h1>
            <p class="login-sub">Chào mừng bạn! Vui lòng đăng nhập hoặc đăng ký.</p>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Đăng nhập</button>
                <button class="tab-btn" onclick="switchTab('register')">Đăng ký</button>
            </div>

            <!-- LOGIN FORM -->
            <form id="login-form" class="form-panel active">
                <div class="field">
                    <label for="username">Tên đăng nhập</label>
                    <input id="username" list="username-list" placeholder="Nhập username" required />
                    <datalist id="username-list">
                        <option value="">Đang tải danh sách...</option>
                    </datalist>
                </div>

                <div class="field">
                    <label for="password">Mật khẩu</label>
                    <input id="password" type="password" placeholder="Nhập mật khẩu" required>
                </div>

                <div class="field" style="display:flex; align-items:center; gap:8px;">
                    <input id="remember" type="checkbox" style="width:16px; height:16px;">
                    <label for="remember" style="margin:0; font-weight:500;">Ghi nhớ đăng nhập trên máy này</label>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" type="submit">Đăng nhập</button>
                    <a class="btn btn-ghost" href="/index.html">Về trang chủ</a>
                </div>
            </form>

            <!-- REGISTER FORM -->
            <form id="register-form" class="form-panel">
                <div class="field">
                    <label for="reg-username">Tên đăng nhập mới</label>
                    <input id="reg-username" type="text" placeholder="Ví dụ: gv-nguyenvana" required />
                </div>
                <div class="field">
                    <label for="reg-fullname">Họ và tên</label>
                    <input id="reg-fullname" type="text" placeholder="Nguyễn Văn A" required />
                </div>
                <div class="field">
                    <label for="reg-password">Mật khẩu</label>
                    <input id="reg-password" type="password" placeholder="Tạo mật khẩu" required>
                </div>
                <div class="field">
                    <label for="reg-email">Email (Tùy chọn)</label>
                    <input id="reg-email" type="email" placeholder="example@school.edu.vn">
                </div>
                <div class="field">
                    <label for="reg-phone">Số điện thoại (Tùy chọn)</label>
                    <input id="reg-phone" type="text" placeholder="09xxxxxxx">
                </div>

                <div class="actions">
                    <button class="btn btn-primary" type="submit" id="btn-register">Đăng ký tài khoản</button>
                </div>
            </form>

            <p class="helper">
                *Lưu ý: Tài khoản đăng ký mới sẽ cần Admin phê duyệt mới có thể đăng nhập.
            </p>
        </section>
    </main>

    <!-- ⚙️ CONFIG: Tự động nhận diện môi trường local/production -->
    <script src="/Javascript/config.js"></script>
    
    <!-- 🔐 AUTH & ROUTING -->
    <script src="/Javascript/auth.js"></script>
    <script>
        (async function () {
            const params = new URLSearchParams(window.location.search);
            if (params.has('redirect')) {
                setTimeout(() => {
                    if (window.showToast) {
                        window.showToast('Bạn cần đăng nhập để truy cập trang này.', 'warning');
                    }
                }, 300);
            }

            if (window.SEBAuth && await window.SEBAuth.restoreSessionFromServer()) {
                window.SEBAuth.redirectAfterLogin('/Page/kho-ca-nhan.html');
                return;
            }

            const usernameSelect = document.getElementById('username');
            const form = document.getElementById('login-form');
            const remember = document.getElementById('remember');

            try {
                const response = await fetch((window.API_BASE_URL || '') + '/api/lookups/users');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                const users = Array.isArray(data.users) ? data.users : [];

                const list = document.getElementById('username-list');
                list.innerHTML = '';
                // Add helpful placeholder
                const placeholderOpt = document.createElement('option');
                placeholderOpt.value = '';
                placeholderOpt.textContent = 'Chọn người dùng';
                list.appendChild(placeholderOpt);

                users.forEach((u) => {
                    const option = document.createElement('option');
                    // Show username as value; include full name in text for some browsers
                    option.value = u.value;
                    option.textContent = u.label ? `${u.value} — ${u.label}` : u.value;
                    list.appendChild(option);
                });
            } catch (error) {
                console.error(error);
                const list = document.getElementById('username-list');
                list.innerHTML = '';
                const opt = document.createElement('option');
                opt.value = '';
                opt.textContent = 'Không tải được danh sách người dùng';
                list.appendChild(opt);
            }

            form.addEventListener('submit', async function (event) {
                event.preventDefault();

                const username = (document.getElementById('username').value || '').trim();
                const password = (document.getElementById('password').value || '').trim();
                if (!username || !password) {
                    window.alert('Vui lòng chọn người dùng và nhập mật khẩu.');
                    return;
                }

                const result = await window.SEBAuth.login(username, password, !!remember.checked);
                if (!result.ok) {
                    console.error('Login failed', result);
                    if (result.status === 423 && result.error === 'account_locked') {
                        const sec = Math.max(0, Number(result.retryAfterSeconds || 0));
                        const min = Math.max(1, Math.ceil(sec / 60));
                        window.alert(`Tài khoản đang bị khóa tạm thời do nhập sai quá nhiều lần. Vui lòng thử lại sau khoảng ${min} phút.`);
                    } else if (result.status === 401) {
                        if (typeof result.attemptsRemaining === 'number' && result.attemptsRemaining >= 0) {
                            window.alert(`Sai tài khoản hoặc mật khẩu. Bạn còn ${result.attemptsRemaining} lần thử trước khi bị khóa 20 phút.`);
                        } else {
                            // Show raw server response if available for debugging
                            if (result.rawBody) {
                                window.alert(`Đăng nhập thất bại: ${result.rawBody}`);
                            } else {
                                window.alert(result.error || 'Sai tài khoản hoặc mật khẩu.');
                            }
                        }
                    } else {
                        if (result.rawBody) {
                            window.alert(`Đăng nhập thất bại: ${result.rawBody}`);
                        } else {
                            window.alert(result.error || 'Đăng nhập thất bại. Vui lòng thử lại.');
                        }
                    }
                    return;
                }

                window.SEBAuth.redirectAfterLogin('/Page/kho_thiet_bi.html');
            });

            // Register form logic
            const registerForm = document.getElementById('register-form');
            if (registerForm) {
                registerForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    const username = document.getElementById('reg-username').value.trim();
                    const fullname = document.getElementById('reg-fullname').value.trim();
                    const password = document.getElementById('reg-password').value.trim();
                    const email = document.getElementById('reg-email').value.trim();
                    const phone = document.getElementById('reg-phone').value.trim();

                    if (!username || !fullname || !password) {
                        window.alert('Vui lòng điền đủ Tên đăng nhập, Họ tên và Mật khẩu.');
                        return;
                    }

                    const btn = document.getElementById('btn-register');
                    btn.disabled = true;
                    btn.textContent = 'Đang xử lý...';

                    try {
                        const response = await fetch((window.API_BASE_URL || '') + '/api/users/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username, password, fullName: fullname, email, phone })
                        });
                        
                        if (response.ok) {
                            window.alert('Đăng ký thành công! Tài khoản của bạn đang ở trạng thái chờ duyệt. Vui lòng liên hệ Admin để kích hoạt.');
                            switchTab('login');
                            registerForm.reset();
                        } else {
                            const err = await response.json();
                            window.alert('Đăng ký thất bại: ' + (err.error || 'Lỗi hệ thống'));
                        }
                    } catch (error) {
                        console.error(error);
                        window.alert('Lỗi kết nối tới máy chủ.');
                    } finally {
                        btn.disabled = false;
                        btn.textContent = 'Đăng ký tài khoản';
                    }
                });
            }
        })();

        // Tab switching logic
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(form => form.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }
    </script>
    <script src="/Javascript/router.js"></script>
    <script src="/Javascript/ui-improvements.js"></script>
</body>
</html>
