<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEB - Đăng nhập</title>
    <link rel="stylesheet" href="../CSS/main.css">
    <style>
        .login-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(160deg, #f8fafc 0%, #e2e8f0 100%);
            padding: 16px;
        }
        .login-card {
            width: 100%;
            max-width: 460px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 14px 40px rgba(15, 23, 42, 0.1);
            padding: 24px;
        }
        .login-title {
            margin: 0 0 4px;
            color: #0f172a;
            font-size: 1.5rem;
        }
        .login-sub {
            margin: 0 0 18px;
            color: #64748b;
            font-size: 0.95rem;
        }
        .field { margin-bottom: 14px; }
        .field label {
            display: block;
            margin-bottom: 6px;
            color: #334155;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .field select, .field input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.95rem;
        }
        .actions {
            margin-top: 18px;
            display: flex;
            gap: 10px;
        }
        .btn {
            border: 0;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-primary {
            background: #0ea5e9;
            color: #fff;
            flex: 1;
        }
        .btn-ghost {
            background: #e2e8f0;
            color: #0f172a;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .helper {
            margin-top: 14px;
            color: #64748b;
            font-size: 0.85rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <main class="login-shell">
        <section class="login-card">
            <h1 class="login-title">Đăng nhập hệ thống SEB</h1>
            <p class="login-sub">Vui lòng chọn tài khoản để tiếp tục sử dụng Kho thiết bị và Kho cá nhân.</p>

            <form id="login-form">
                <div class="field">
                    <label for="username">Người dùng</label>
                    <input id="username" list="username-list" placeholder="gv-a hoặc chọn từ danh sách" required />
                    <datalist id="username-list">
                        <option value="">Đang tải danh sách...</option>
                    </datalist>
                </div>

                <div class="field">
                    <label for="password">Mật khẩu (demo)</label>
                    <input id="password" type="password" placeholder="Nhập để hoàn tất thao tác đăng nhập" required>
                </div>

                <div class="field" style="display:flex; align-items:center; gap:8px;">
                    <input id="remember" type="checkbox" style="width:16px; height:16px;">
                    <label for="remember" style="margin:0; font-weight:500;">Ghi nhớ đăng nhập trên máy này</label>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" type="submit">Đăng nhập</button>
                    <a class="btn btn-ghost" href="../index.html">Về trang chủ</a>
                </div>
            </form>

            <p class="helper">
                Gói B: đăng nhập đã gọi backend auth và cấp session bằng cookie HttpOnly. Tài khoản mẫu hiện dùng mật khẩu mặc định: 123456.
            </p>
        </section>
    </main>

    <script src="../Javascript/auth.js"></script>
    <script>
        (async function () {
            if (window.SEBAuth && await window.SEBAuth.restoreSessionFromServer()) {
                window.SEBAuth.redirectAfterLogin('/Page/kho-ca-nhan.html');
                return;
            }

            const usernameSelect = document.getElementById('username');
            const form = document.getElementById('login-form');
            const remember = document.getElementById('remember');

            try {
                const response = await fetch((window.API_BASE_URL || '') + '/api/lookups/users');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                const users = Array.isArray(data.users) ? data.users : [];

                const list = document.getElementById('username-list');
                list.innerHTML = '';
                // Add helpful placeholder
                const placeholderOpt = document.createElement('option');
                placeholderOpt.value = '';
                placeholderOpt.textContent = 'Chọn người dùng';
                list.appendChild(placeholderOpt);

                users.forEach((u) => {
                    const option = document.createElement('option');
                    // Show username as value; include full name in text for some browsers
                    option.value = u.value;
                    option.textContent = u.label ? `${u.value} — ${u.label}` : u.value;
                    list.appendChild(option);
                });
            } catch (error) {
                console.error(error);
                const list = document.getElementById('username-list');
                list.innerHTML = '';
                const opt = document.createElement('option');
                opt.value = '';
                opt.textContent = 'Không tải được danh sách người dùng';
                list.appendChild(opt);
            }

            form.addEventListener('submit', async function (event) {
                event.preventDefault();

                const username = (document.getElementById('username').value || '').trim();
                const password = (document.getElementById('password').value || '').trim();
                if (!username || !password) {
                    window.alert('Vui lòng chọn người dùng và nhập mật khẩu.');
                    return;
                }

                const result = await window.SEBAuth.login(username, password, !!remember.checked);
                if (!result.ok) {
                    console.error('Login failed', result);
                    if (result.status === 423 && result.error === 'account_locked') {
                        const sec = Math.max(0, Number(result.retryAfterSeconds || 0));
                        const min = Math.max(1, Math.ceil(sec / 60));
                        window.alert(`Tài khoản đang bị khóa tạm thời do nhập sai quá nhiều lần. Vui lòng thử lại sau khoảng ${min} phút.`);
                    } else if (result.status === 401) {
                        if (typeof result.attemptsRemaining === 'number' && result.attemptsRemaining >= 0) {
                            window.alert(`Sai tài khoản hoặc mật khẩu. Bạn còn ${result.attemptsRemaining} lần thử trước khi bị khóa 20 phút.`);
                        } else {
                            // Show raw server response if available for debugging
                            if (result.rawBody) {
                                window.alert(`Đăng nhập thất bại: ${result.rawBody}`);
                            } else {
                                window.alert(result.error || 'Sai tài khoản hoặc mật khẩu.');
                            }
                        }
                    } else {
                        if (result.rawBody) {
                            window.alert(`Đăng nhập thất bại: ${result.rawBody}`);
                        } else {
                            window.alert(result.error || 'Đăng nhập thất bại. Vui lòng thử lại.');
                        }
                    }
                    return;
                }

                window.SEBAuth.redirectAfterLogin('/Page/kho_thiet_bi.html');
            });
        })();
    </script>
</body>
</html>
